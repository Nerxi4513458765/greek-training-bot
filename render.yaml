services:
  - type: web
    name: greek-training-bot
    env: docker
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: WEB_APP_URL
        value: https://nerxi4513458765.github.io/greek-training-app/
      - key: RENDER
        value: true